<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Amoeba Cosmic Background</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #ffffff;
    width: 100%;
    height: 100%;
    cursor: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 11px; color: rgba(0,0,0,0.25);
    user-select: none; pointer-events: none;
    transition: opacity 0.6s;
  }
  body.idle #hint { opacity: 0; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="hint">F = フルスクリーン / ↑↓ = 強度 / 画面を触るとアメーバ</div>
<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W, H, CX, CY, DPR, BASE;

  // 七色
  const HUES = [0, 30, 55, 130, 210, 255, 295];

  // ---- 星（固定位置・サイズ脈動のみ・絶対に消えない）----
  const STAR_DENSITY = 0.00008;  // 単位ピクセルあたり
  let stars = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.width  = Math.floor(window.innerWidth  * DPR);
    H = canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    CX = W/2; CY = H/2;
    BASE = Math.min(W, H);

    // 星を画面サイズに応じて再生成（固定位置）
    const count = Math.max(60, Math.floor(W * H * STAR_DENSITY));
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        baseSize: (2.5 + Math.random() * 4) * DPR,  // 2.5〜6.5 dp
        twSpeed: 0.8 + Math.random() * 2.2,
        twPhase: Math.random() * Math.PI * 2,
        hue: HUES[Math.floor(Math.random() * HUES.length)],
        hueDrift: Math.random() * Math.PI * 2
      });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  let intensity = 1.0;
  let T = 0, last = performance.now();

  // ---- 触ってうねうねアメーバ ----
  const pointer = { x: 0, y: 0, has: false };
  const blob = { x: 0, y: 0, inited: false };
  let pointerActivity = 0;  // 0..1（離すとフェード）

  function setPointer(e) {
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    pointer.x = t.clientX * DPR;
    pointer.y = t.clientY * DPR;
    pointer.has = true;
    pointerActivity = Math.min(1, pointerActivity + 0.18);
    if (!blob.inited) { blob.x = pointer.x; blob.y = pointer.y; blob.inited = true; }
  }
  window.addEventListener('pointermove', setPointer);
  window.addEventListener('pointerdown', e => { setPointer(e); pointerActivity = 1; });
  window.addEventListener('touchmove', e => { setPointer(e); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchstart', e => { setPointer(e); pointerActivity = 1; });

  function drawAmoeba(dt) {
    pointerActivity = Math.max(0, pointerActivity - dt * 0.45);
    if (pointerActivity < 0.01 || !blob.inited) return;

    // バネ追従（柔らかく）
    blob.x += (pointer.x - blob.x) * 0.20;
    blob.y += (pointer.y - blob.y) * 0.20;

    const cx = blob.x, cy = blob.y;
    const baseR = BASE * 0.16 * intensity;
    const segments = 28;

    ctx.globalCompositeOperation = 'source-over';
    // 七色のアメーバを少しずつズラして重ねる → うねうね生命体
    for (let i = 0; i < HUES.length; i++) {
      const hue = (HUES[i] + T * 22) % 360;
      const ph = i * 0.85;

      ctx.beginPath();
      for (let j = 0; j <= segments; j++) {
        const a = (j / segments) * Math.PI * 2;
        // 多重サインノイズで有機的な輪郭
        const n =
            Math.sin(a * 3 + T * 2.1 + ph) * 0.28 +
            Math.sin(a * 5 + T * 1.4 + ph * 1.7) * 0.16 +
            Math.cos(a * 2 + T * 0.8 + ph * 0.4) * 0.10;
        const r = baseR * (0.55 + 0.45 * (0.7 + n) + i * 0.04);
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 1.3);
      g.addColorStop(0,   `hsla(${hue}, 100%, 60%, ${0.42 * pointerActivity})`);
      g.addColorStop(0.5, `hsla(${hue}, 100%, 70%, ${0.18 * pointerActivity})`);
      g.addColorStop(1,   `hsla(${hue}, 100%, 80%, 0)`);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // 中心の小さな核
    const coreR = baseR * 0.18 * (0.9 + 0.2 * Math.sin(T * 4));
    const coreHue = (T * 60) % 360;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    cg.addColorStop(0, `hsla(${coreHue}, 100%, 75%, ${0.7 * pointerActivity})`);
    cg.addColorStop(1, `hsla(${coreHue}, 100%, 85%, 0)`);
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
    ctx.fill();
  }

  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    T += dt;

    // 呼吸サイクル: 0=集中 / 1=拡散（周期 9秒）
    const breath = 0.5 + 0.5 * Math.sin(T * (Math.PI * 2 / 9));

    // ---- 1. 純白で塗りつぶし ----
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // ---- 2. 中央の鼓動コア ----
    {
      const pulse = 0.5 + 0.5 * Math.sin(T * 1.7);
      const r = BASE * (0.10 + 0.10 * pulse + 0.10 * breath) * intensity;
      const hue = (T * 28) % 360;
      const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
      g.addColorStop(0,   `hsla(${hue}, 100%, 72%, 0.45)`);
      g.addColorStop(0.4, `hsla(${(hue+60)%360}, 100%, 76%, 0.22)`);
      g.addColorStop(0.7, `hsla(${(hue+150)%360}, 100%, 82%, 0.08)`);
      g.addColorStop(1,   `hsla(${(hue+240)%360}, 100%, 88%, 0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // ---- 3. 七色の大グラデーション雲 ----
    // 呼吸 0 → 中央集中 / 呼吸 1 → 全方位拡散
    for (let i = 0; i < HUES.length; i++) {
      const ang = (i / HUES.length) * Math.PI * 2 + T * 0.10;
      const orbit = BASE * (0.04 + 0.42 * breath) * intensity;
      const x = CX + Math.cos(ang) * orbit;
      const y = CY + Math.sin(ang) * orbit;
      const r = BASE * (0.42 + 0.18 * breath);
      const hue = (HUES[i] + T * 6) % 360;

      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0,   `hsla(${hue}, 95%, 64%, 0.28)`);
      g.addColorStop(0.4, `hsla(${hue}, 90%, 72%, 0.16)`);
      g.addColorStop(1,   `hsla(${hue}, 90%, 82%, 0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // ---- 4. 触ったらアメーバ（雲の上・星の下）----
    drawAmoeba(dt);

    // ---- 5. 星（常時表示・固定位置・サイズだけ脈動）----
    for (const s of stars) {
      // サイズが 0.55〜1.0 倍で脈動（完全には消えない）
      const raw = 0.5 + 0.5 * Math.sin(T * s.twSpeed + s.twPhase);
      const scale = 0.55 + 0.45 * raw;
      const r = s.baseSize * scale;
      // 色相もゆっくり回転（虹のフィールド感）
      const hue = (s.hue + T * 25 + Math.sin(T * 0.3 + s.hueDrift) * 40) % 360;

      // ハロー（彩度100%・明度中、白でも雲の上でも視認）
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 5);
      g.addColorStop(0,    `hsla(${hue}, 100%, 60%, 0.95)`);
      g.addColorStop(0.22, `hsla(${hue}, 100%, 66%, 0.55)`);
      g.addColorStop(0.55, `hsla(${hue}, 100%, 75%, 0.20)`);
      g.addColorStop(1,    `hsla(${hue}, 100%, 85%, 0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 5, 0, Math.PI * 2);
      ctx.fill();

      // 中心の明るい芯（フルアルファ、明度高め）
      ctx.fillStyle = `hsla(${hue}, 100%, 82%, 1)`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 1.3, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- 操作 ----
  let idleTimer = null;
  function showHint() {
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => document.body.classList.add('idle'), 3000);
  }
  showHint();
  window.addEventListener('mousemove', showHint);

  document.addEventListener('keydown', (e) => {
    showHint();
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    } else if (e.key === 'ArrowUp') {
      intensity = Math.min(2.5, intensity + 0.15);
    } else if (e.key === 'ArrowDown') {
      intensity = Math.max(0.3, intensity - 0.15);
    }
  });
})();
</script>
</body>
</html>
